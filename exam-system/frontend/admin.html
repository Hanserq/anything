<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>ExamLAN Command Center</title>
<link rel="stylesheet" href="/css/admin.css"/>
</head>
<body>

<div id="screen-token">
  <div class="token-card">
    <div class="brand">🔑</div>
    <h2>Admin Access</h2>
    <input class="token-input" id="token-input" type="password" placeholder="Admin token…"/>
    <button class="btn-accent" style="width:100%" id="token-submit">Enter Command Center</button>
  </div>
</div>

<div id="app" style="display:none; flex-direction:column; height:100%">
  <header class="admin-topbar">
    <div class="topbar-logo">⚡</div>
    <div class="topbar-title" id="topbar-title">ExamLAN</div>
    <span id="admin-conn">○ Offline</span>
    <button class="btn-sm outline" id="btn-back" style="display:none">Back</button>
    <button class="btn-sm outline" id="btn-hard-reset" style="opacity:0.6;font-size:10px">Reset</button>
  </header>

  <main id="screen-sessions" style="flex:1; overflow-y:auto">
    <div style="padding:24px; display:flex; justify-content:space-between; align-items:center">
      <h1 style="margin:0">Active Sessions</h1>
      <button class="btn-accent" id="create-session-btn">+ New Session</button>
    </div>
    <div class="sessions-grid" id="session-list"></div>
  </main>

  <main id="screen-control" class="dashboard-grid" style="display:none">
    <section class="ctrl-main">
      <!-- Status Bar -->
      <div class="status-banner">
        <div>
          <div class="status-label">Session Status</div>
          <div class="status-val" id="ctrl-status-badge">Waiting</div>
        </div>
        <div style="text-align:right">
          <div class="status-label">Students</div>
          <div class="status-val" id="live-conn">0</div>
        </div>
      </div>

      <!-- Current Question Card -->
      <div id="cur-q-panel" style="background:var(--panel); padding:24px; border-radius:20px; border:1px solid var(--border); margin-bottom:32px">
        <div style="display:flex; justify-content:space-between; margin-bottom:12px">
          <span class="status-label">Current Question</span>
          <span id="answer-stat-display" style="color:var(--success); font-weight:700"></span>
        </div>
        <h2 id="cur-q-text" style="margin:0; font-size:20px">No question active</h2>
        <div id="cur-q-options" style="margin-top:16px; color:var(--text-dim); font-size:14px"></div>
      </div>

      <!-- Big Action Buttons -->
      <div class="action-grid">
        <button class="cmd-btn start" id="btn-start" style="display:none">
          <span class="icon">🚀</span>Start Exam
        </button>
        <button class="cmd-btn next" id="btn-next-q" style="display:none">
          <span class="icon">➡️</span>Next Question
        </button>
        <button class="cmd-btn" id="btn-end-q" style="background:#475569; display:none">
          <span class="icon">🛑</span>End Question
        </button>
        <button class="cmd-btn pause" id="btn-pause" style="display:none">
          <span class="icon">⏸️</span>Pause
        </button>
        <button class="cmd-btn start" id="btn-resume" style="display:none">
          <span class="icon">▶️</span>Resume
        </button>
        <button class="cmd-btn next" id="btn-export" style="background:#1e293b; display:none">
          <span class="icon">📥</span>Export Results
        </button>
        <button class="cmd-btn end" id="btn-end" style="display:none">
          <span class="icon">⏹️</span>Terminate Exam
        </button>
      </div>

      <!-- Add Questions on the fly -->
      <div id="add-q-live-box" style="margin-top:40px; padding:24px; background:rgba(255,255,255,0.02); border-radius:20px">
        <h3 style="margin-top:0">Add Live Question</h3>
        <div class="form-f">
          <textarea id="q-text-input" placeholder="Type question here..." rows="2"></textarea>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
          <input id="opt0" placeholder="Option A"/>
          <input id="opt1" placeholder="Option B"/>
          <input id="opt2" placeholder="Option C"/>
          <input id="opt3" placeholder="Option D"/>
        </div>
        <div style="display:flex; gap:12px; margin-top:12px">
          <input id="correct-idx" type="number" value="0" style="width:100px" placeholder="Corr ID"/>
          <button class="btn-sm accent" id="btn-add-live-q" style="flex:1">Push to Session</button>
        </div>
      </div>
    </section>

    <!-- Sidebar: Leaderboard & Activity -->
    <aside class="dashboard-sidebar">
      <div class="sidebar-sect">
        <h3>🏆 Live Leaderboard</h3>
        <div class="mini-lb" id="admin-leaderboard"></div>
      </div>
      <div class="sidebar-sect" style="flex:0; min-height:250px; border-top:1px solid var(--border)">
        <h3>⚡ Live Activity</h3>
        <div class="activity-log" id="violation-log"></div>
      </div>
    </aside>
  </main>
</div>

<!-- Modal: Create Session -->
<div class="modal-overlay hidden" id="create-modal">
  <div class="modal-sheet">
    <h2>New Examination</h2>
    <div class="form-f">
      <label>Exam Title</label>
      <input id="session-title" placeholder="e.g. Science Midterm"/>
    </div>
    <div class="form-f">
      <label>Join Code (Optional)</label>
      <input id="session-code" placeholder="e.g. SC24" style="text-transform:uppercase; font-weight:800"/>
    </div>
    <div id="draft-list" style="margin-bottom:20px; max-height:150px; overflow-y:auto"></div>
    
    <div style="background:rgba(255,255,255,0.03); padding:16px; border-radius:12px; border:1px dashed var(--border)">
      <h3 style="margin-top:0; font-size:14px">Bulk Import (CSV Format)</h3>
      <p style="font-size:10px; color:var(--text-dim); margin-bottom:8px">Format: Question, Opt A, Opt B, Opt C, Opt D, CorrectIdx(0-3)</p>
      <textarea id="bulk-import-area" style="width:100%; background:rgba(0,0,0,0.3); color:var(--text); border:1px solid var(--border); border-radius:8px; font-family:monospace; font-size:11px" rows="5" placeholder="What is 2+2, 3, 4, 5, 6, 1"></textarea>
      <button class="btn-sm outline" id="btn-parse-bulk" style="width:100%; margin-top:8px">Process Bulk Data</button>
    </div>

    <hr class="divider" style="margin:20px 0; opacity:0.1"/>
    
    <button class="btn-sm accent" id="add-question-btn" style="width:100%">+ Add Single Question Manually</button>
    
    <div style="display:flex; gap:12px; margin-top:32px">
      <button class="btn-sm" id="cancel-create" style="flex:1">Cancel</button>
      <button class="btn-accent" id="submit-create" style="flex:1">Create Now</button>
    </div>
  </div>
</div>

<div id="toast-container" style="position:fixed; bottom:20px; right:20px; z-index:1000"></div>

<script src="/js/ws-client.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
