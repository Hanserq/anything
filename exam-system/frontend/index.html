<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>ExamLAN — Student</title>
<meta name="theme-color" content="#0c0c0c"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="stylesheet" href="/css/student.css"/>
</head>
<body>

<!-- Connection indicator -->
<div class="conn-pill" id="conn-pill">
  <span class="conn-dot"></span>
  <span id="conn-label">Offline</span>
</div>

<!-- ── Join ───────────────────────────────────────────────────────── -->
<div class="screen active" id="screen-join">
  <div class="join-wrap">
    <div class="join-brand">
      <h1>Exam<span>LAN</span></h1>
      <p>Enter your details to join the exam</p>
    </div>
    <div class="join-fields">
      <input id="inp-name" type="text" placeholder="Full Name" autocomplete="name"/>
      <input id="inp-roll" type="text" placeholder="Roll Number" autocomplete="off"/>
      <input id="inp-code" type="text" placeholder="JOIN CODE" autocomplete="off" autocapitalize="characters"/>
      <button class="btn-join" id="btn-join">Join Exam →</button>
    </div>
  </div>
</div>

<!-- ── Waiting ────────────────────────────────────────────────────── -->
<div class="screen" id="screen-waiting">
  <div class="wait-pulse">⏳</div>
  <h2 id="wait-name">You're in!</h2>
  <p>Waiting for the teacher to start the exam…</p>
  <div class="wait-code-pill" id="wait-code"></div>
</div>

<!-- ── Question ───────────────────────────────────────────────────── -->
<div class="screen" id="screen-question">
  <div class="q-topbar">
    <span class="q-badge" id="q-badge">Q — / —</span>
    <div class="q-topbar-sep"></div>
    <div class="timer-wrap">
      <div class="timer-num" id="timer-num">—</div>
      <div class="timer-bar">
        <div class="timer-fill" id="timer-fill" style="width:100%"></div>
      </div>
    </div>
  </div>
  <div class="q-body">
    <div class="q-text" id="q-text"></div>
    <div class="options-grid" id="options-grid"></div>
  </div>
</div>

<!-- ── Locked ─────────────────────────────────────────────────────── -->
<div class="screen" id="screen-locked">
  <div class="lock-icon">🔒</div>
  <h2>Exam Locked</h2>
  <p id="lock-msg">Your exam has been locked due to violations. Please contact your teacher.</p>
</div>

<!-- ── Results ────────────────────────────────────────────────────── -->
<div class="screen" id="screen-results">
  <div class="results-card">
    <h1>🎉 Exam Complete</h1>
    <p>Here's how you did</p>
    <div class="results-stats">
      <div class="res-stat">
        <div class="val" id="r-rank">—</div>
        <div class="lbl">Rank</div>
      </div>
      <div class="res-stat">
        <div class="val" id="r-score">—</div>
        <div class="lbl">Score</div>
      </div>
      <div class="res-stat">
        <div class="val" id="r-correct">—</div>
        <div class="lbl">Correct</div>
      </div>
    </div>
    <div id="r-lb"></div>
  </div>
</div>

<div id="toasts"></div>

<script src="/js/ws-client.js"></script>
<script src="/js/db.js"></script>
<script src="/js/student.js"></script>
<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
</script>
</body>
</html>
